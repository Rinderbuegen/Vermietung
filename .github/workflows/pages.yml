name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python scripts/build-content-index.py
      - run: python scripts/build-pages-site.py
      - run: python scripts/verify-pages-site.py
      - run: node tests/service-worker.test.js
      - name: Configure runtime
        env:
          APPS_SCRIPT_WEB_APP_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
        run: |
          if [ -z "$APPS_SCRIPT_WEB_APP_URL" ]; then
            echo "::error::Secret APPS_SCRIPT_WEB_APP_URL fehlt."
            exit 1
          fi
          python scripts/configure-runtime.py "$APPS_SCRIPT_WEB_APP_URL" _site
      - name: Verify Pages artifact
        run: |
          test -f _site/DGH/index.html
          test -f _site/Gemeindehaus/index.html
          test ! -d _site/dgh-rb
          test ! -d _site/ev-gem-rb
          if grep -R "script.google.com/macros/s/DEPLOYMENT_ID/exec\|dgh-rb\|ev-gem-rb" _site; then
            echo "::error::Pages artifact enthält alte Pfade oder Platzhalter."
            exit 1
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
