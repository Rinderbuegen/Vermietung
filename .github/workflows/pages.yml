name: Pages Quality And Deployment

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Qualität
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python scripts/build-apps-script.py
      - run: python scripts/build-pages-site.py
      - run: python scripts/verify-pages-site.py
      - run: python tests/content-build.test.py
      - run: python tests/frontend-modules.test.py
      - run: python tests/configure-runtime.test.py
      - run: npm test
      - run: node tests/apps-script.test.js
      - run: node tests/service-worker.test.js

  browser:
    name: Browser (${{ matrix.browser }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/build-pages-site.py
      - run: python -m pip install playwright==1.61.0
      - run: python -m playwright install --with-deps ${{ matrix.browser }}
      - run: python tests/browser.test.py --browser ${{ matrix.browser }}

  pwa-offline:
    name: PWA Offline (Chromium)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/build-pages-site.py
      - run: python -m pip install playwright==1.61.0
      - run: python -m playwright install --with-deps chromium
      - run: python tests/pwa-browser.test.py

  deploy:
    name: Pages Bereitstellung
    needs: [quality, browser, pwa-offline]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python scripts/build-apps-script.py
      - run: python scripts/build-pages-site.py
      - name: Configure runtime
        env:
          APPS_SCRIPT_WEB_APP_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
        run: |
          if [ -z "$APPS_SCRIPT_WEB_APP_URL" ]; then
            echo "::error::Secret APPS_SCRIPT_WEB_APP_URL fehlt."
            exit 1
          fi
          python scripts/configure-runtime.py "$APPS_SCRIPT_WEB_APP_URL" _site
      - name: Verify final Pages artifact
        run: python scripts/verify-pages-site.py --final-artifact
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
